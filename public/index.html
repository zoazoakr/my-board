<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Full-Stack Board</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view {
            display: none !important;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-white text-xl font-bold tracking-tight">구글 스프레드시트 엑셀 연구소</span>
                </div>
                <div class="flex items-center space-x-4" id="nav-user-area">
                    <!-- Nav area dynamically populated -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto py-8 px-4 sm:px-6 lg:px-8">

        <!-- Auth View -->
        <section id="view-auth" class="hidden-view max-w-md mx-auto mt-10">
            <div class="glass-panel p-8 rounded-2xl">
                <h2 class="text-2xl font-bold text-center mb-6 text-gray-800" id="auth-title">로그인</h2>

                <form id="auth-form" class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700">아이디</label>
                        <input type="text" id="username" name="username" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">비밀번호</label>
                        <input type="password" id="password" name="password" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                        <span id="auth-submit-text">로그인</span>
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-600">
                        <span id="auth-toggle-text">계정이 없으신가요?</span>
                        <a href="#" id="toggle-auth-mode"
                            class="font-medium text-indigo-600 hover:text-indigo-500">회원가입</a>
                    </p>
                </div>
            </div>
        </section>

        <!-- Board View -->
        <section id="view-board" class="hidden-view">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">최근 게시물</h2>
                <button id="btn-new-post"
                    class="hidden inline-flex items-center px-5 py-2.5 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                    글쓰기
                </button>
            </div>

            <div class="glass-panel rounded-xl overflow-hidden shadow-sm border border-gray-100">
                <ul id="posts-list" class="divide-y divide-gray-200">
                    <li class="p-8 text-center text-gray-500">게시물을 불러오는 중...</li>
                </ul>
            </div>
        </section>

        <!-- Write Post View -->
        <section id="view-write" class="hidden-view max-w-2xl mx-auto">
            <div class="mb-4">
                <button id="btn-back" class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center">
                    ← 목록으로 돌아가기
                </button>
            </div>
            <div class="glass-panel p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 id="write-title" class="text-2xl font-bold mb-6 text-gray-900">새 게시물 작성</h2>
                <form id="post-form" class="space-y-6">
                    <div>
                        <label for="post-title" class="block text-sm font-medium text-gray-700">제목</label>
                        <input type="text" id="post-title" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 text-lg">
                    </div>
                    <div>
                        <label for="post-content" class="block text-sm font-medium text-gray-700">내용</label>
                        <textarea id="post-content" rows="6" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                    </div>

                    <div class="pt-4 border-t border-gray-100">
                        <button type="submit" id="post-submit-btn"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-colors">
                            등록하기
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Post Detail View -->
        <section id="view-post-detail" class="hidden-view max-w-3xl mx-auto">
            <div class="mb-4 flex justify-between items-center">
                <button id="btn-back-from-detail"
                    class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center">
                    ← 목록으로 돌아가기
                </button>
                <div id="post-actions" class="hidden space-x-3">
                    <button id="btn-edit-post"
                        class="px-4 py-2 text-sm font-medium rounded-md text-indigo-700 bg-indigo-100 hover:bg-indigo-200 transition-colors">수정</button>
                    <button id="btn-delete-post"
                        class="px-4 py-2 text-sm font-medium rounded-md text-red-700 bg-red-100 hover:bg-red-200 transition-colors">삭제</button>
                </div>
            </div>

            <div class="glass-panel p-8 rounded-2xl shadow-sm border border-gray-100 mb-8">
                <h1 id="detail-title" class="text-3xl font-bold text-gray-900 mb-4"></h1>
                <div class="flex items-center text-sm text-gray-500 mb-8 border-b border-gray-100 pb-4">
                    <span id="detail-author" class="font-medium text-gray-700 mr-2"></span>
                    <span>&bull;</span>
                    <span id="detail-date" class="ml-2"></span>
                </div>
                <div id="detail-content" class="text-gray-800 text-lg whitespace-pre-wrap leading-relaxed mb-6"></div>

            </div>

            <!-- Comments Section -->
            <div class="glass-panel p-8 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-900 mb-6">댓글</h3>

                <ul id="comments-list" class="space-y-6 mb-8">
                    <li class="text-gray-500 text-center py-4">댓글을 불러오는 중...</li>
                </ul>

                <form id="comment-form" class="hidden mt-6 pt-6 border-t border-gray-100">
                    <label for="comment-content" class="sr-only">댓글 작성</label>
                    <textarea id="comment-content" rows="3" required
                        class="block w-full rounded-md border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500 mb-3"
                        placeholder="댓글을 남겨보세요..."></textarea>
                    <div class="flex justify-end">
                        <button type="submit" id="comment-submit-btn"
                            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                            댓글 달기
                        </button>
                    </div>
                </form>
                <div id="comment-login-prompt" class="text-center py-6 bg-gray-50 rounded-lg mt-6 text-gray-600">
                    댓글을 작성하려면 <a href="#" id="link-login-comment"
                        class="text-indigo-600 font-medium hover:underline">로그인</a>하세요.
                </div>
            </div>
        </section>

    </main>

    <script src="/app.js"></script>
</body>

</html>
